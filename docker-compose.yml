services:
  redis:
    image: redis:7-alpine
    container_name: indexer-redis
    ports:
      - "6379:6379"
    # volatile-lru (not allkeys-lru): metric buckets all carry TTLs and may be
    # evicted under pressure, but the persistent block cursor must never be.
    command: redis-server --maxmemory 256mb --maxmemory-policy volatile-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
